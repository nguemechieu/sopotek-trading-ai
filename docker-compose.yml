services:
  mysql:
    image: mysql:8.4
    container_name: sopotek_trading_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-sopotek_trading}
      MYSQL_USER: ${MYSQL_USER:-sopotek}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-sopotek_local}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_local}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: sopotek-trading-ai:latest
    container_name: sopotek_trading_app
    working_dir: /app
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PYTHONPATH: /app/src
      SOPOTEK_DATABASE_URL: mysql+pymysql://${MYSQL_USER:-sopotek}:${MYSQL_PASSWORD:-sopotek_local}@mysql:3306/${MYSQL_DATABASE:-sopotek_trading}?charset=utf8mb4
      QT_X11_NO_MITSHM: "1"
      DISPLAY: ${DISPLAY:-}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./output:/app/output
      - ./.env:/app/.env:ro
    stdin_open: true
    tty: true
    command: python src/main.py

  app-headless:
    build:
      context: .
      dockerfile: Dockerfile
    image: sopotek-trading-ai:latest
    container_name: sopotek_trading_app_headless
    working_dir: /app
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PYTHONPATH: /app/src
      SOPOTEK_DATABASE_URL: mysql+pymysql://${MYSQL_USER:-sopotek}:${MYSQL_PASSWORD:-sopotek_local}@mysql:3306/${MYSQL_DATABASE:-sopotek_trading}?charset=utf8mb4
      QT_QPA_PLATFORM: offscreen
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./output:/app/output
      - ./.env:/app/.env:ro
    profiles:
      - headless
    command: python src/main.py

volumes:
  mysql_data:
