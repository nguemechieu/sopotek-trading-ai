version: "3.9"

services:

  worker:
    build:
      context: .
    container_name: sopotek_worker
    depends_on:
      - redis
      - db
    environment:
      DATABASE_URL: mysql+pymysql://sopotek:sopotek_secure_pass@db:3306/trading
      REDIS_URL: redis://redis:6379
    command: celery -A sopotek_trading.celery_app worker --loglevel=info

  # ----------------------------
  # MySQL Database
  # ----------------------------
  db:
    image: mysql:8.3
    container_name: sopotek_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_secure_pass
      MYSQL_DATABASE: trading
      MYSQL_USER: sopotek
      MYSQL_PASSWORD: sopotek_secure_pass
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"

  # ----------------------------
  # Redis Cache
  # ----------------------------
  redis:
    image: redis:7
    container_name: sopotek_redis
    restart: always
    ports:
      - "6379:6379"

  # ----------------------------
  # Trading Engine
  # ----------------------------
  engine:
    build:
      context: ../../../..
      dockerfile: Dockerfile
    container_name: sopotek_engine
    restart: always
    depends_on:
      - db
      - redis
    environment:
      DATABASE_URL: mysql+pymysql://sopotek:sopotek_secure_pass@db:3306/trading
      REDIS_URL: redis://redis:6379
    command: python -m sopotek_trading.engine

  # ----------------------------
  # API Layer
  # ----------------------------
  api:
    build:
      context: ../../../..
      dockerfile: Dockerfile
    container_name: sopotek_api
    restart: always
    depends_on:
      - db
      - engine
    environment:
      DATABASE_URL: mysql+pymysql://sopotek:sopotek_secure_pass@db:3306/trading
    command: python -m sopotek_trading.api
    ports:
      - "8000:8000"

volumes:
  mysql_data: