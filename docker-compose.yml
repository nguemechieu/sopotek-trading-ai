services:
  postgres:
    image: postgres:16-alpine
    container_name: sopotek_trading_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sopotek_trading}
      POSTGRES_USER: ${POSTGRES_USER:-sopotek}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sopotek_local}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: bigbossmanager/sopotek-trading-ai:latest
    container_name: sopotek_trading_app
    working_dir: /app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PYTHONPATH: /app/src
      SOPOTEK_DATABASE_MODE: remote
      SOPOTEK_DATABASE_URL: ${SOPOTEK_DATABASE_URL:-postgresql+psycopg://sopotek:sopotek_local@postgres:5432/sopotek_trading}
      QT_X11_NO_MITSHM: "1"
      DISPLAY: ${DISPLAY:-}
    volumes:
      - ./credentials.json:/app/credentials.json
      - ./data:/app/data
      - ./logs:/app/logs
      - ./output:/app/output
      - ./.env:/app/.env:ro
    stdin_open: true
    tty: true
    command: python -m sopotek_trading

  app-headless:
    build:
      context: .
      dockerfile: Dockerfile
    image: sopotek-trading-ai:latest
    container_name: sopotek_trading_app_headless
    working_dir: /app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PYTHONPATH: /app/src
      SOPOTEK_DATABASE_MODE: remote
      SOPOTEK_DATABASE_URL: ${SOPOTEK_DATABASE_URL:-postgresql+psycopg://sopotek:sopotek_local@postgres:5432/sopotek_trading}
      QT_QPA_PLATFORM: offscreen
    volumes:
      - ./credentials.json:/app/credentials.json
      - ./data:/app/data
      - ./logs:/app/logs
      - ./output:/app/output
      - ./.env:/app/.env:ro
    profiles:
      - headless
    command: python -m sopotek_trading

  app-http:
    build:
      context: .
      dockerfile: Dockerfile
    image: sopotek-trading-ai:latest
    container_name: sopotek_trading_app_http
    working_dir: /app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PYTHONPATH: /app/src
      SOPOTEK_DATABASE_MODE: remote
      SOPOTEK_DATABASE_URL: ${SOPOTEK_DATABASE_URL:-postgresql+psycopg://sopotek:sopotek_local@postgres:5432/sopotek_trading}
      SOPOTEK_HTTP_UI: "1"
      SOPOTEK_DISABLE_WEBENGINE: "1"
      DISPLAY: :99
      QT_QPA_PLATFORM: xcb
      LIBGL_ALWAYS_SOFTWARE: "1"
      QT_OPENGL: software
      QT_QUICK_BACKEND: software
      QSG_RHI_BACKEND: software
      QT_XCB_GL_INTEGRATION: none
      QTWEBENGINE_DISABLE_SANDBOX: "1"
      QTWEBENGINE_CHROMIUM_FLAGS: --no-sandbox --disable-gpu --disable-gpu-compositing --disable-gpu-rasterization --disable-dev-shm-usage --disable-features=Vulkan,VulkanFromANGLE,UseSkiaRenderer
      SCREEN_WIDTH: ${SCREEN_WIDTH:-1600}
      SCREEN_HEIGHT: ${SCREEN_HEIGHT:-900}
      SCREEN_DEPTH: ${SCREEN_DEPTH:-24}
      NOVNC_PORT: 6080
      NOVNC_RESIZE_MODE: ${NOVNC_RESIZE_MODE:-off}
      VNC_PORT: 5900
    volumes:
      - ./credentials.json:/app/credentials.json
      - ./data:/app/data
      - ./logs:/app/logs
      - ./output:/app/output
      - ./.env:/app/.env:ro
    ports:
      - "127.0.0.1:${APP_HTTP_PORT:-6080}:6080"
    profiles:
      - browser
    command: /app/scripts/docker/start_http_ui.sh

volumes:
  postgres_data:
