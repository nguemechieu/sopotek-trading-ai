name: CI

on:
  push:
    branches:
      - master
    tags:
      - "v*.*.*"
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  QT_QPA_PLATFORM: offscreen

jobs:
  test-and-coverage:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Conda environment
        uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: sopotek-trading-ai
          auto-activate-base: false
          channels: conda-forge,defaults
          environment-file: environment.yml
          python-version: "3.10"

      - name: Verify environment
        shell: bash -el {0}
        run: |
          python --version
          python -m pip --version

      - name: Lint with flake8
        shell: bash -el {0}
        run: |
          python -m flake8 src --count --select=E9,F63,F7,F82 --show-source --statistics
          python -m flake8 src --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Test with pytest and coverage
        shell: bash -el {0}
        run: |
          python -m pytest src/tests -q \
            --cov=src \
            --cov-branch \
            --cov-report=term-missing:skip-covered \
            --cov-report=xml \
            --cov-report=html

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            .coverage
            coverage.xml
            htmlcov/

  package-build:
    runs-on: ubuntu-latest
    needs:
      - test-and-coverage
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build package distributions
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          python -m twine check dist/*

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-distributions
          path: dist/

  docker-validate:
    runs-on: ubuntu-latest
    needs:
      - test-and-coverage
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Validate docker compose
        run: |
          touch .env
          docker compose config

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: sopotek-trading-ai:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-test container import path
        run: |
          docker run --rm \
            -e QT_QPA_PLATFORM=offscreen \
            sopotek-trading-ai:ci \
            python -c "import main; print('main import ok', main.__file__)"
